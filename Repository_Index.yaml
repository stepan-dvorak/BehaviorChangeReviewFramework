maintenance_rules:
  update_when:
    - a canonical document is added, renamed, moved, archived, or superseded
    - a concept changes status or definition source
    - a query route gains a better primary source
    - a planned document is created
    - a known consistency issue is resolved
  validation_checks:
    - YAML parses successfully.
    - Every documents.path exists with exact case.
    - No archived document is marked canonical or normative.
    - Every superseded family identifies its current replacement when one exists.
    - Every missing document remains absent or is reclassified after creation.
    - Query routes use current paths and respect governance precedence.
  recommended_location: /Repository_Index.yaml
