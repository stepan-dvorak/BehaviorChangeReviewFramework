schema_version: "1.0.0"

index:
  id: ORDEN-REPOSITORY-INDEX-001
  title: Orden Repository Retrieval Index
  purpose: >-
    Machine-readable semantic index for locating, prioritizing, and combining
    repository content during AI-assisted research, review, and contribution.
  generated_on: 2026-07-17
  source_repository: https://github.com/stepan-dvorak/BehaviorChangeReviewFramework
  source_branch: main
  source_commit: 807188fbd5aff5db1daad681e6da986a71afd0d3
  maintenance: manual
  intended_consumers:
    - AI assistants
    - repository search tools
    - human contributors

project:
  id: Orden
  name: Behavior Change Review Framework
  domain: Microsoft Dynamics 365 Business Central software architecture
  repository_kind: governed research knowledge base
  primary_research_question: >-
    Can a mechanism-independent review framework be defined for architecturally
    significant behavior-changing customizations in Business Central?
  working_hypothesis: >-
    A significant change to an established effective execution flow may also
    modify architectural properties carried by that flow; those impacts should
    be reviewed independently of the implementation mechanism.
  hypothesis_status: unverified
  intended_contribution: >-
    A practical Business Central specialization and integration of established
    architecture concepts, not a new extensibility mechanism or architecture style.
  seed_case: IsHandled pattern
  mechanisms_in_scope:
    - IsHandled
    - event subscribers
    - interfaces
    - Strategy implementations
    - delegation
    - workflows
    - plugin architectures

retrieval_policy:
  default_language: English
  available_languages:
    - English
  path_case_sensitive: true
  precedence:
    - Governance_Principles.md
    - Repository_Standards.md
    - Repository_Taxonomy.md
    - Editorial_Style_Guide.md
    - Reasoning_Standard.md
    - document-specific guidance
    - current task instructions
  startup_context:
    - AGENTS.md
    - Contributing_for_AI.md
    - Governance_Principles.md
    - Repository_Standards.md
    - Editorial_Style_Guide.md
    - Reasoning_Standard.md
    - 00_Project_Charter.md
    - 01_Terminology.md
    - 02_Research_Methodology.md
  rules:
    - Prefer canonical root documents over files in Archive/.
    - Treat Microsoft guidance as evidence rather than as repository conclusions.
    - Separate facts, observations, interpretations, hypotheses, and conclusions.
    - Preserve Candidate status until a repository concept is validated.
    - Prefer ISO terminology, then Microsoft terminology, then repository terminology.
    - Use empirical studies as case evidence, not as universally generalizable proof.
    - Read a document's dependencies before changing its conclusions or terminology.
    - Never infer existence from a planned filename; check document status below.
  archive_policy:
    default_retrieval: exclude
    use_only_for:
      - provenance
      - document evolution
      - superseded wording
      - historical comparison
    never_use_as:
      - current governance
      - canonical Microsoft IsHandled analysis
      - current AI contribution instructions
  authority_labels:
    normative: Binding repository rule or required operating procedure.
    canonical: Current authoritative repository synthesis for its subject.
    evidentiary: Evidence or analysis used to support research conclusions.
    working: Draft research state, hypothesis, or provisional synthesis.
    navigational: Locator or inventory; does not override source documents.
    template: Structure for a new artifact; contains no case conclusion.
    historical: Contextual history or provenance; not current normative guidance.
    archived: Superseded material excluded from ordinary retrieval.

query_routes:
  - intent: understand_project
    retrieve:
      - README.md
      - 00_Project_Charter.md
      - 00_Research_Log.md
    then:
      - Whitepaper/Behavior_Change_Review_Framework_for_Business_Central_Research_Draft.md
  - intent: edit_or_create_repository_content
    retrieve:
      - AGENTS.md
      - Contributing_for_AI.md
      - Governance_Principles.md
      - Repository_Standards.md
      - Editorial_Style_Guide.md
      - Reasoning_Standard.md
      - Repository_Taxonomy.md
  - intent: resolve_or_introduce_terminology
    retrieve:
      - Terminology_Index.md
      - 01_Terminology.md
      - 03_Related_Work.md
      - References/ISO_42010.md
    rule: Do not introduce a synonym without updating Terminology_Index.md.
  - intent: evaluate_evidence_or_form_a_conclusion
    retrieve:
      - Evidence_Hierarchy.md
      - Reasoning_Standard.md
      - 02_Research_Methodology.md
    rule: Retrieve the relevant primary reference and empirical study as applicable.
  - intent: research_architecture_review_foundation
    retrieve:
      - References/ISO_42010.md
      - References/ISO_42020.md
      - References/ISO_42030.md
      - References/ATAM.md
      - References/SAAM.md
      - References/SEI_Documenting_Behavior.md
  - intent: research_microsoft_extensibility
    retrieve:
      - References/Microsoft_Extensibility_Overview.md
      - References/Microsoft_Event_Types.md
      - References/Microsoft_Interfaces.md
      - References/Microsoft_IsHandled_v2.0.md
  - intent: analyze_ishandled
    retrieve:
      - References/Microsoft_IsHandled_v2.0.md
      - References/Microsoft_Extensibility_Overview.md
      - Empirical/KMITS-BA4_Finance-IsHandled-Audit.md
      - Empirical/MS-CZF-IsHandled-Refactoring-Analysis-cs.md
      - Empirical/MS-CZL-IsHandled-Refactoring-Analysis-Report.md
    optional_history:
      - Historical_References/Mark_Brummel_Handled_Pattern.md
      - Historical_References/Vjeko_Gentlemens_Agreement.md
      - Historical_References/Vjeko_Codeunit_Interfaces.md
  - intent: inspect_empirical_evidence
    retrieve:
      - Templates/Empirical_Study_Template.md
      - Empirical/KMITS-BA4_Finance-IsHandled-Audit.md
      - Empirical/MS-CZF-IsHandled-Refactoring-Analysis-cs.md
      - Empirical/MS-CZL-IsHandled-Refactoring-Analysis-Report.md
    caution: The three studies use differing formats and are not yet normalized.
  - intent: synthesize_or_edit_whitepaper
    retrieve:
      - Whitepaper/Behavior_Change_Review_Framework_for_Business_Central_Research_Draft.md
      - 00_Project_Charter.md
      - 00_Research_Log.md
      - 01_Terminology.md
      - 02_Research_Methodology.md
      - 03_Related_Work.md
      - References/ISO_42010.md
      - References/ISO_42020.md
      - References/ISO_42030.md
      - References/Microsoft_IsHandled_v2.0.md
  - intent: create_new_research_artifact
    retrieve:
      - Templates/Research_Document_Template.md
      - Repository_Standards.md
      - Editorial_Style_Guide.md
      - Evidence_Hierarchy.md
  - intent: create_architecture_decision
    retrieve:
      - Templates/ADR_Template.md
      - Repository_Standards.md
      - Governance_Principles.md

