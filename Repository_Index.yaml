    retrieval_effect: Do not assume absent front matter means low importance; use authority fields in this index.
  - id: IDX-ISSUE-005
    severity: medium
    issue: Terminology_Index.md points candidate IsHandled concepts to Microsoft_IsHandled.md rather than the actual current path.
    retrieval_effect: Resolve those definitions to References/Microsoft_IsHandled_v2.0.md.
  - id: IDX-ISSUE-006
